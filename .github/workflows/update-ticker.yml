name: Update match ticker

# Runs every 5 minutes so an in-progress RIFC match shows a near-live score in
# the ticker (public repo = free unlimited minutes). The updater only writes to
# Ghost when the value actually changes, so quiet runs are cheap no-ops.
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Update RIFC ticker in Ghost
        env:
          GHOST_ADMIN_KEY: ${{ secrets.GHOST_ADMIN_KEY }}
          GHOST_URL: https://casual-macaque.pikapod.net
        run: node tools/update-ticker.mjs
